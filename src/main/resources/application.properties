spring.application.name=timetable-generator

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/schedulify}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

timefold.solver.termination.spent-limit=10s

server.port=${PORT:8080}